!DOCTYPE html>
  <head>
    <title>jQuery List Interaction</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    
    <ul id="color-list">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
    
    <h2>List of Cats:</h2>
    <ul id="cats-list"></ul>
    
    <h2>Form Example:</h2>
    <form id="form-id">
      <label for="input-field">Enter something: </label>
      <input type="text" id="input-field" name="text">
      <input type="submit" value="Submit">
    </form>
    <p id="message"></p>
    
    <script>
      $('#color-list li').on('click', function() {
        $('#color-list li').css('color', 'blue');
      });

      const cats = [
        { name: 'Charlie', adoptionStatus: 'available' },
        { name: 'Lily', adoptionStatus: 'not-available' },
        { name: 'Coco', adoptionStatus: 'available' },
        { name: 'Oreo', adoptionStatus: 'not-available' },
        { name: 'Luna', adoptionStatus: 'available' },
        { name: 'Milo', adoptionStatus: 'available' },
        { name: 'Lola', adoptionStatus: 'not-available' },
        { name: 'Leo', adoptionStatus: 'available' },
        { name: 'Willow', adoptionStatus: 'available' },
        { name: 'Bella', adoptionStatus: 'not-available' },
        { name: 'Max', adoptionStatus: 'available' },
        { name: 'Cleo', adoptionStatus: 'available' },
        { name: 'Lucy', adoptionStatus: 'not-available' },
        { name: 'Daisy', adoptionStatus: 'available' }
      ];

      cats.forEach(cat => {
        $('#cats-list').append(`<li>${cat.name} - ${cat.adoptionStatus}</li>`);
      });

      $('#form-id').on('submit', function(e) {
        e.preventDefault();
        const inputValue = $('#input-field').val().trim();
        const message = $('#message');
        
        message.text('');

        if (inputValue === '') {
          message.text('Please Provide a Value').css('background-color', 'red');
        } else {
          message.text('Success').css('background-color', 'green');
        }
        
        console.log(inputValue);
      });
    
    </script>
  
  </body>
</html>
