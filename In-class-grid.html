<html>
<head>
  
    <title>CSS Grid Layout</title>
    <style>
        body,html {
            height: 100%;
        }
    
        .grid-container {height:100%
        ;
            display: grid; 
            
            grid-template-rows: 20% 20% 20% 20% 20%;
            grid-template-columns: 20% 20% 20% 20% 20%;
        }
        
        .grid-item-1 {
            grid-row-start: 1; 
            grid-row-end: 2;   
            grid-column-start: 1; 
            grid-column-end: 6;  
            background-color: blue; 
        }
       
        .grid-item-2 {
            grid-row-start: 3; 
            grid-row-end: 6;   
            grid-column-start: 4; 
            grid-column-end: 6;   
            background-color: green; 
        
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item-1 grid-item">Div 1</div>
        <div class="grid-item-2 grid-item">Div 2</div>
    </div>
</body>
</html>
